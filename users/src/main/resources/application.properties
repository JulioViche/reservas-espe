spring.application.name=users
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/users}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:jvc21}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:passwd123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs
