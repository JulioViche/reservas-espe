_format_version: "3.0"
services:
  # ==================== Users API ====================

  - name: persons
    url: http://users-api:8081/api/v1/persons
    routes:
      - name: persons
        paths:
          - /persons
        strip_path: true
  - name: users
    url: http://users-api:8081/api/v1/users
    routes:
      - name: users
        paths:
          - /users
        strip_path: true
  - name: roles
    url: http://users-api:8081/api/v1/roles
    routes:
      - name: roles
        paths:
          - /roles
        strip_path: true

  # ==================== Parking API ====================

  - name: spaces
    url: http://parking-api:8080/api/v1/spaces
    routes:
      - name: spaces
        paths:
          - /spaces
        strip_path: true
  - name: zones
    url: http://parking-api:8080/api/v1/zones
    routes:
      - name: zones
        paths:
          - /zones
        strip_path: true

  # ==================== Vehicles API ====================

  - name: vehicles
    url: http://vehicles-api:3000
    routes:
      - name: vehicles
        paths:
          - /vehicles
        strip_path: false

  # ==================== Assignments API ====================

  - name: assignments
    url: http://assignments-api:3000
    routes:
      - name: assignments
        paths:
          - /assignments
        strip_path: false

  # ==================== API Docs (para Swagger unificado) ====================

  - name: parking-api-docs
    url: http://parking-api:8080/api-docs
    routes:
      - name: parking-api-docs
        paths:
          - /parking/api-docs
        strip_path: true
  - name: users-api-docs
    url: http://users-api:8081/api-docs
    routes:
      - name: users-api-docs
        paths:
          - /users/api-docs
        strip_path: true
  - name: vehicles-api-docs
    url: http://vehicles-api:3000/api-docs
    routes:
      - name: vehicles-api-docs
        paths:
          - /vehicles/api-docs
        strip_path: true
  - name: assignments-api-docs
    url: http://assignments-api:3000/api-docs
    routes:
      - name: assignments-api-docs
        paths:
          - /assignments/api-docs
        strip_path: true

  # ==================== Rutas internas (para Swagger Try it out) ====================

  - name: parking-internal
    url: http://parking-api:8080
    routes:
      - name: parking-internal
        paths:
          - /api/parking
        strip_path: true

  - name: users-internal
    url: http://users-api:8081
    routes:
      - name: users-internal
        paths:
          - /api/users
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - "*"
