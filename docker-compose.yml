services:

  # ==================== Databases ====================

  vehicles-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vehicles
      POSTGRES_USER: jvc21
      POSTGRES_PASSWORD: passwd123
    ports:
      - "5434:5432"
    volumes:
      - vehicles-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jvc21 -d vehicles"]
      interval: 5s
      timeout: 3s
      retries: 5

  parking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: jvc21
      POSTGRES_PASSWORD: passwd123
    ports:
      - "5432:5432"
    volumes:
      - parking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jvc21 -d parking"]
      interval: 5s
      timeout: 3s
      retries: 5

  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: jvc21
      POSTGRES_PASSWORD: passwd123
    ports:
      - "5433:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jvc21 -d users"]
      interval: 5s
      timeout: 3s
      retries: 5

  assignments-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assignments
      POSTGRES_USER: jvc21
      POSTGRES_PASSWORD: passwd123
    ports:
      - "5435:5432"
    volumes:
      - assignments-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jvc21 -d assignments"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== Microservices ====================

  parking-api:
    build:
      context: ./parking
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://parking-db:5432/parking
      SPRING_DATASOURCE_USERNAME: jvc21
      SPRING_DATASOURCE_PASSWORD: passwd123
    depends_on:
      parking-db:
        condition: service_healthy

  users-api:
    build:
      context: ./users
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/users
      SPRING_DATASOURCE_USERNAME: jvc21
      SPRING_DATASOURCE_PASSWORD: passwd123
    depends_on:
      users-db:
        condition: service_healthy

  vehicles-api:
    build:
      context: ./vehicles
    environment:
      DB_HOST: vehicles-db
      DB_PORT: "5432"
      DB_USERNAME: jvc21
      DB_PASSWORD: passwd123
      DB_NAME: vehicles
    depends_on:
      vehicles-db:
        condition: service_healthy

  assignments-api:
    build:
      context: ./assignments
    environment:
      DB_HOST: assignments-db
      DB_PORT: "5432"
      DB_USERNAME: jvc21
      DB_PASSWORD: passwd123
      DB_NAME: assignments
      VEHICLES_API_URL: http://vehicles-api:3000
    depends_on:
      assignments-db:
        condition: service_healthy

  # ==================== Swagger UI Unificado ====================

  swagger-ui:
    image: swaggerapi/swagger-ui
    environment:
      URLS: '[
        {"name": "Parking", "url": "http://localhost:3000/parking/api-docs"},
        {"name": "Users", "url": "http://localhost:3000/users/api-docs"},
        {"name": "Vehicles", "url": "http://localhost:3000/vehicles/api-docs"},
        {"name": "Assignments", "url": "http://localhost:3000/assignments/api-docs"}
      ]'

  # ==================== API Gateway ====================

  kong:
    image: kong:3.9
    ports:
      - "3000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      - parking-api
      - users-api
      - vehicles-api
      - assignments-api
      - swagger-ui

volumes:
  parking-db-data:
  users-db-data:
  vehicles-db-data:
  assignments-db-data:
